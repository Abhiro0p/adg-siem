apiVersion: batch/v1
kind: CronJob
metadata:
  name: pcap-retention
  namespace: honeypots
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              image: alpine:3.20
              command:
                - /bin/sh
                - -c
                - find /pcap -type f -name "*.pcap" -mtime +7 -delete
              volumeMounts:
                - name: pcap
                  mountPath: /pcap
          restartPolicy: OnFailure
          volumes:
            - name: pcap
              emptyDir: {}

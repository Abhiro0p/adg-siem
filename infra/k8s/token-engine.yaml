apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-engine
  namespace: honeypots
spec:
  replicas: 1
  selector:
    matchLabels:
      app: token-engine
  template:
    metadata:
      labels:
        app: token-engine
    spec:
      containers:
        - name: token-engine
          image: adg/token-engine:latest
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: token-engine
  namespace: honeypots
spec:
  selector:
    app: token-engine
  ports:
    - port: 8081
      targetPort: 8081

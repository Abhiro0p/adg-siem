apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-soar
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-soar
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-soar
    spec:
      containers:
        - name: soar-playbooks
          image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.service.port }}

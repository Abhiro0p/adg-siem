apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dionaea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-dionaea
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-dionaea
    spec:
      containers:
        - name: dionaea
          image: {{ .Values.dionaea.image }}
          ports:
            - containerPort: 445
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dionaea
spec:
  selector:
    app: {{ .Release.Name }}-dionaea
  ports:
    - port: {{ .Values.dionaea.servicePort }}
      targetPort: 445
    - port: 80
      targetPort: 80

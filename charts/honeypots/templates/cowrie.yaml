apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-cowrie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-cowrie
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-cowrie
    spec:
      containers:
        - name: cowrie
          image: {{ .Values.cowrie.image }}
          ports:
            - containerPort: 2222
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-cowrie
spec:
  selector:
    app: {{ .Release.Name }}-cowrie
  ports:
    - port: {{ .Values.cowrie.servicePort }}
      targetPort: 2222
